name: OpsDesk Security Gates

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  kubernetes-config-scan:
    name: Kubernetes Config Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Render Kubernetes manifests
        run: |
          kubectl kustomize k8s/base > rendered-base.yaml
          kubectl kustomize k8s/monitoring > rendered-monitoring.yaml
          cat rendered-base.yaml rendered-monitoring.yaml > rendered-manifests.yaml

      - name: Scan Kubernetes manifests with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: rendered-manifests.yaml
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
