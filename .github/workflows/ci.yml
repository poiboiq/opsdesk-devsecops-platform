name: OpsDesk CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Build, Docker, and Kubernetes Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Check backend JavaScript syntax
        run: |
          node --check src/server.js
          node --check src/config/db.js
          node --check src/routes/health.routes.js
          node --check src/routes/incident.routes.js
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build backend Docker image
        run: docker build -t opsdesk-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build --build-arg VITE_API_BASE_URL=http://localhost:30081 -t opsdesk-frontend:ci ./frontend

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Render Kubernetes manifests
        run: |
          kubectl kustomize k8s/base > rendered-base.yaml
          kubectl kustomize k8s/monitoring > rendered-monitoring.yaml
          cat rendered-base.yaml rendered-monitoring.yaml > rendered-manifests.yaml

      - name: Verify rendered Kubernetes manifests
        run: |
          test -s rendered-manifests.yaml
          grep -q "kind: Deployment" rendered-manifests.yaml
          grep -q "kind: Service" rendered-manifests.yaml
          grep -q "namespace: opsdesk" rendered-manifests.yaml
          grep -q "namespace: monitoring" rendered-manifests.yaml
