apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsdesk-app
  namespace: argocd
  labels:
    app.kubernetes.io/name: opsdesk-app
    app.kubernetes.io/part-of: opsdesk-devsecops-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: opsdesk

  source:
    repoURL: https://github.com/poiboiq/opsdesk-devsecops-platform.git
    targetRevision: main
    path: k8s/base

  destination:
    server: https://kubernetes.default.svc
    namespace: opsdesk

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
