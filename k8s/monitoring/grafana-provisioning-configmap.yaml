apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
  labels:
    app: grafana
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false

  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: OpsDesk
        orgId: 1
        folder: OpsDesk
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
